spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: next-home-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/next_home}
    username: ${POSTGRES_USER:next_home}
    password: ${POSTGRES_PASSWORD:next_home_local_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  vworld:
    endpoint: ${VWORLD_WFS_ENDPOINT:https://api.vworld.kr/req/wfs}
    key: ${VWORLD_API_KEY:}
    domain: ${VWORLD_API_DOMAIN:http://localhost}
    boundary-import-enabled: ${VWORLD_BOUNDARY_IMPORT_ENABLED:false}
  naver:
    client-id: ${NAVER_MAP_CLIENT_ID:}
    client-secret: ${NAVER_MAP_CLIENT_SECRET:}
    geocoding:
      endpoint: ${NAVER_GEOCODING_ENDPOINT:https://maps.apigw.ntruss.com/map-geocode/v2/geocode}
      daily-limit: ${NAVER_GEOCODING_DAILY_LIMIT:900}
      monthly-limit: ${NAVER_GEOCODING_MONTHLY_LIMIT:18000}
      batch-size: ${NAVER_GEOCODING_BATCH_SIZE:50}
      backfill-enabled: ${NAVER_GEOCODING_BACKFILL_ENABLED:true}
      backfill-interval-ms: ${NAVER_GEOCODING_BACKFILL_INTERVAL_MS:3600000}
      backfill-initial-delay-ms: ${NAVER_GEOCODING_BACKFILL_INITIAL_DELAY_MS:120000}
  push:
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    vapid-subject: ${VAPID_SUBJECT:mailto:admin@next-home.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${BACKEND_PORT:8080}
