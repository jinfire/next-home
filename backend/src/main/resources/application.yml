spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: next-home-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/next_home}
    username: ${POSTGRES_USER:next_home}
    password: ${POSTGRES_PASSWORD:next_home_local_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  push:
    vapid-public-key: ${VAPID_PUBLIC_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${BACKEND_PORT:8080}
