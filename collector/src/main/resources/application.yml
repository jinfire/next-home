spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: next-home-collector
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/next_home}
    username: ${POSTGRES_USER:next_home}
    password: ${POSTGRES_PASSWORD:next_home_local_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: false

next-home:
  molit:
    endpoint: ${MOLIT_API_ENDPOINT:https://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev}
    service-key: ${MOLIT_API_KEY:}
  collector:
    enabled: ${COLLECTOR_ENABLED:false}
    region-code: ${COLLECTOR_REGION_CODE:}
    region-name: ${COLLECTOR_REGION_NAME:}
    month: ${COLLECTOR_MONTH:}
    rows: ${COLLECTOR_ROWS:100}
  capital-collector:
    enabled: false
    start-month: ${CAPITAL_COLLECTION_START_MONTH:2026-01}
    end-month: ${CAPITAL_COLLECTION_END_MONTH:2026-06}
    rows: ${CAPITAL_COLLECTION_ROWS:500}
